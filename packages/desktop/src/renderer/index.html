<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; img-src 'self' data:" />
    <title>LocalCoast</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header id="chrome">
      <div id="brand">LocalCoast</div>
      <button id="back-btn" aria-label="Back to servers">← Back</button>
      <div id="gallery-toolbar">
        <input id="gallery-search" type="search" placeholder="Search services…" autocomplete="off" aria-label="Search servers by name" />
        <div id="filter-framework" class="dropdown"></div>
        <div id="filter-type" class="dropdown"></div>
        <div id="sort-by" class="dropdown"></div>
      </div>
      <nav id="tabstrip"></nav>
      <button id="reload-btn" title="Reload (new epoch)" aria-label="Reload tab (new epoch)">⟳</button>
      <button id="record-btn" title="Record screen" aria-label="Record screen">⏺</button>
      <button id="sidebar-btn" title="Toggle sidebar" aria-label="Toggle sidebar">◫</button>
    </header>
    <main id="home">
      <div id="server-list"></div>
    </main>
    <aside id="sidebar">
      <nav id="panel-tabs">
        <button data-panel="network" class="active">Network</button>
        <button data-panel="console">Console</button>
        <button data-panel="errors">Errors</button>
        <button data-panel="storage">Storage</button>
        <button data-panel="perf">Perf</button>
        <button data-panel="components">Components</button>
      </nav>
      <section id="panel-network" class="panel active">
        <div id="network-toolbar">
          <button id="network-copy">Copy</button>
          <button id="network-ts-toggle" title="Toggle timestamps">Timestamps</button>
        </div>
        <div id="network-totals"></div>
        <div id="network-rows"></div>
      </section>
      <section id="panel-console" class="panel">
        <div id="console-toolbar">
          <button id="console-copy">Copy</button>
          <button class="console-level active" data-level="log">log</button>
          <button class="console-level active" data-level="info">info</button>
          <button class="console-level active" data-level="warn">warn</button>
          <button class="console-level active" data-level="error">error</button>
          <input id="console-search" type="text" placeholder="filter…" autocomplete="off" />
        </div>
        <div id="console-rows"></div>
      </section>
      <section id="panel-errors" class="panel">
        <div id="errors-summary"></div>
        <div id="errors-rows"></div>
      </section>
      <section id="panel-storage" class="panel">
        <div id="storage-state"></div>
        <h3 class="storage-h">Usage trail</h3>
        <div id="storage-trail"></div>
      </section>
      <section id="panel-perf" class="panel">
        <div id="perf-tiers"></div>
        <div id="perf-samples"></div>
        <h3 class="storage-h">Build status</h3>
        <div id="perf-build"></div>
      </section>
      <section id="panel-components" class="panel">
        <button id="components-inspect">Inspect: off</button>
        <p class="hint">Hold Option over the page (or toggle) to highlight components; click copies name + path.</p>
        <div id="components-picked"></div>
        <h3 class="storage-h">Component tree</h3>
        <div id="components-tree"></div>
      </section>
    </aside>
    <div id="net-drawer" class="hidden">
      <div id="net-drawer-panel">
        <div id="net-drawer-head">
          <span id="net-drawer-title"></span>
          <button id="net-drawer-close" aria-label="Close detail">×</button>
        </div>
        <div id="net-drawer-body"></div>
      </div>
    </div>
    <div id="palette" class="hidden">
      <div id="palette-box">
        <input id="palette-input" type="text" placeholder="Type a command…" autocomplete="off" />
        <div id="palette-results"></div>
      </div>
    </div>
    <script src="bundle.js"></script>
  </body>
</html>
